<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MC Punch List — Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f5;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      object-fit: contain;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #555; font-size: 14px; max-width: 320px; margin: 0 auto; }
    button {
      margin-top: 20px;
      border: 0;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 800;
      background: #111;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <img class="logo" src="/brand/logo-mark.png" alt="MC Construction" />
    <h1>You're offline</h1>
    <p>MC Punch List needs an internet connection to load or save project data. Reconnect and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
